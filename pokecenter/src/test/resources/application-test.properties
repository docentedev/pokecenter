spring.application.name=pokecenter
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Use JPA schema generation in tests to keep H2 independent from PostgreSQL SQL syntax.
spring.flyway.enabled=false

# Logging
logging.level.root=DEBUG
logging.level.org.springframework=DEBUG
logging.level.com.noentiendo.pokecenter=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration (test values)
jwt.secret=test-secret-key-for-testing-purposes-change-in-production
jwt.expiration=3600000
