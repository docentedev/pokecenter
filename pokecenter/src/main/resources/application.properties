spring.application.name=pokecenter

# set port 3334
server.port=3334

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/pokedex}
spring.datasource.username=${DB_USERNAME:pokedex}
spring.datasource.password=${DB_PASSWORD:pokedex}
spring.datasource.driver-class-name=org.postgresql.Driver

# Show all logs for debugging purposes
logging.level.root=DEBUG
logging.level.org.springframework=DEBUG
logging.level.com.example.pokecenter=DEBUG

# Show SQL statements in the logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# http://localhost:3333/api
apiPokedex.url=http://localhost:3333/api

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
jwt.expiration=${JWT_EXPIRATION:3600000}